{% extends "base.html" %}
{% block title %}Log in · QBank{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Log in</h1>
  <form method="post" class="form-grid one-col">
    <label>Username <input name="username" autofocus required></label>
    <label>Password <input type="password" name="password" required></label>
    <button type="submit" class="btn primary">Log in</button>
  </form>
  <p class="muted">No account? <a href="{{ url_for('register') }}">Sign up</a> — you'll get 10 free credits.</p>
</div>
{% endblock %}
